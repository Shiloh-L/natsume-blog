server:
  port: 8083

spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:blog}
    password: ${RABBITMQ_PASSWORD:blog123}
    virtual-host: /
  cloud:
    sentinel:
      transport:
        dashboard: ${SENTINEL_HOST:localhost}:8858
      eager: true
  ai:
    embedding:
      transformer:
        cache:
          directory: /app/model-cache
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_PORT:6334}
        collection-name: blog_posts
        initialize-schema: true
        use-tls: false

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s

knife4j:
  enable: true
  setting:
    language: zh_cn
springdoc:
  swagger-ui:
    path: /doc.html

logging:
  level:
    com.natsume.blog.search: info
