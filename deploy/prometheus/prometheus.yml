global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'blog-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'blog-gateway:8080'
          - 'blog-auth:8081'
          - 'blog-content:8082'
          - 'blog-search:8083'
          - 'blog-ai:8084'
        labels:
          group: 'natsume-blog'
