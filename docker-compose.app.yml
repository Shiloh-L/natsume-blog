# 应用服务编排 —— 复用 docker-compose.middleware.yml 创建的 blog-net 网络
# 使用: docker compose -f docker-compose.app.yml up -d --build
name: blog-app

services:
  blog-app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MODULE: blog-app
    image: natsume/blog-app:2.0.0
    container_name: blog-app
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      JAVA_OPTS: "-Xms256m -Xmx768m -XX:+UseG1GC -XX:MaxMetaspaceSize=256m"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: blog
      MYSQL_PASSWORD: blog123
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: redis123
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6334"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:9000
      SITE_BASE_URL: http://localhost:8888
      MODEL_CACHE_DIR: /app/model-cache
      LLM_BASE_URL: https://api.deepseek.com
      LLM_API_KEY: ${LLM_API_KEY:?请在 .env 中配置 LLM_API_KEY}
      LLM_MODEL: deepseek-chat
      LOG_PATH: /app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    volumes:
      - search-model-cache:/app/model-cache
      - ./logs:/app/logs
    networks: [blog-net]

  blog-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: natsume/blog-frontend:2.0.0
    container_name: blog-frontend
    restart: unless-stopped
    ports:
      - "8888:80"
    depends_on:
      - blog-app
    networks: [blog-net]

networks:
  blog-net:
    name: blog-net
    external: true

volumes:
  search-model-cache:
