server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 允许上传高清大图（最大 50MB）
    client_max_body_size 50m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API 反向代理到后端单体应用
    # 用变量 + Docker 内置 DNS 做运行时解析，避免后端容器重建后 nginx 因缓存旧 IP 而 502
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream_app blog-app;
        proxy_pass http://$upstream_app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 大文件上传：放宽超时
        client_max_body_size 50m;
        proxy_request_buffering off;
        # 支持 SSE 流式
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # RSS 订阅源与站点地图：代理到后端动态生成
    location = /rss.xml {
        resolver 127.0.0.11 valid=10s;
        set $upstream_feed blog-app;
        proxy_pass http://$upstream_feed:8080/rss.xml;
        proxy_set_header Host $host;
    }
    location = /sitemap.xml {
        resolver 127.0.0.11 valid=10s;
        set $upstream_feed blog-app;
        proxy_pass http://$upstream_feed:8080/sitemap.xml;
        proxy_set_header Host $host;
    }

    # SPA history 路由
    location / {
        try_files $uri $uri/ /index.html;
    }
}
