    <path d="M60 74 L60 112"/>
    <path d="M60 80 C56 78 53 79 51 82"/>
    <path d="M60 80 C64 78 67 79 69 82"/>
    <path d="M60 90 C55 88 51 89 48 93"/>
    <path d="M60 90 C65 88 69 89 72 93"/>
    <path d="M60 100 C56 98 53 99 51 102"/>
    <path d="M60 100 C64 98 67 99 69 102"/>
  </g>

  <!-- 眼睛 -->
  <circle cx="48" cy="70" r="5.4" fill="#fff"/>
  <circle cx="72" cy="70" r="5.4" fill="#fff"/>
  <circle cx="48.6" cy="70.6" r="3" fill="#4A3F35"/>
  <circle cx="71.4" cy="70.6" r="3" fill="#4A3F35"/>
  <circle cx="49.6" cy="69.6" r="0.9" fill="#fff"/>
  <circle cx="72.4" cy="69.6" r="0.9" fill="#fff"/>

  <!-- 腮红与微笑（闭口，无牙，区别明显） -->
