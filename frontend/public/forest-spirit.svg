  <ellipse cx="78" cy="80" rx="3.4" ry="2" fill="#d98e5a" opacity="0.4"/>
  <path d="M55 82 Q60 86 65 82" stroke="#6B5D4F" stroke-width="1.6" fill="none" stroke-linecap="round"/>

  <!-- 小爪 -->
  <ellipse cx="30" cy="104" rx="7" ry="9" fill="#8a9a86"/>
  <ellipse cx="90" cy="104" rx="7" ry="9" fill="#8a9a86"/>
</svg>
