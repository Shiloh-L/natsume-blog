  <path d="M60 60 C76 60 84 78 84 96 C84 116 73 126 60 126 C47 126 36 116 36 96 C36 78 44 60 60 60 Z" fill="#f3ece0"/>

  <!-- 肚皮上的蕨叶纹（原创，非箭形纹） -->
