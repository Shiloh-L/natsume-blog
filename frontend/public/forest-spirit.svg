    <path d="M60 30 L60 44" stroke="#6B5D4F" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- 耳朵（叶形，区别于尖耳） -->
  <path d="M34 52 C30 36 40 32 46 44 C42 48 38 50 36 54 Z" fill="#8a9a86"/>
  <path d="M86 52 C90 36 80 32 74 44 C78 48 82 50 84 54 Z" fill="#8a9a86"/>

