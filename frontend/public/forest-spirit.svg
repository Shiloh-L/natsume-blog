<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- 森灵 · 原创森林守护者：唤起宫崎骏式的森林精灵气质，非任何版权角色 -->
  <ellipse cx="60" cy="132" rx="34" ry="6" fill="#4A3F35" opacity="0.12"/>

  <!-- 举着的叶伞 -->
